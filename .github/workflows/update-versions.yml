name: Update Versions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1" # run every Monday at 04:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update versions.md
        run: python scripts/update_versions.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh tool versions"
          committer: llm-shared-bot <41898282+github-actions[bot]@users.noreply.github.com>
          author: lepinkainen <58150+lepinkainen@users.noreply.github.com>
          branch: update/toolchain-versions
          delete-branch: true
          title: "chore: refresh tool versions"
          body: |
            Automated update of Go, Python, and GitHub Action versions.
            Generated by the scheduled Update Versions workflow.
